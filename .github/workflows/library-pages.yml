name: Publish Star Atlas Library

on:
  push:
    branches: [main]
    paths:
      - "knowledge/**"
      - "publication/site/**"
      - ".github/workflows/library-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate and build the Library
        run: npm --prefix publication/site run check
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Library artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: publication/site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy the Library
        id: deployment
        uses: actions/deploy-pages@v4
